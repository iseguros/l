<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizar Seguro | iSeguros</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="style.css">

    <style>
        .quote-main {
            max-width: 800px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .quote-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border-top: 5px solid var(--azul);
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--azul-dark);
            font-size: 0.9rem;
        }

        .input-field {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #edf2f7;
            border-radius: 8px;
            margin-bottom: 20px;
            font-family: 'Poppins', sans-serif;
            transition: 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--azul);
            background: #fff;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .submit-btn {
            background: var(--azul);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .submit-btn:hover {
            background: var(--azul-dark);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 97, 175, 0.3);
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .quote-card { padding: 25px; }
            .quote-main { margin: 30px auto; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container animate__animated animate__fadeIn">
            <img src="logo.png" alt="iSeguros Logo">
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="asistencia.html" class="asistencia-btn">Asistencia 24/7</a></li>
                <li><a href="faq.html">Preguntas Frecuentes</a></li>
                <li><a href="seguros.html">Productos</a></li>
                <li><a href="cotizar.html" class="active">Cotizar</a></li>
            </ul>
        </nav>
    </header>

    <main class="quote-main animate__animated animate__fadeInUp">
        <div class="section-title">
            <h2>Solicita tu Cotización</h2>
            <div class="underline"></div>
            <p style="text-align: center; color: #666; margin-bottom: 40px;">Un asesor experto analizará las mejores opciones para ti.</p>
        </div>
    </main>

        <div class="quote-card">
            <form action="#">
                <div class="form-grid">
                    <div>
                        <label class="form-label">Nombre Completo</label>
                        <input type="text" class="input-field" placeholder="Ej. David Tello" required>
                    </div>
                    <div>
                        <label class="form-label">WhatsApp de contacto</label>
                        <input type="tel" class="input-field" placeholder="099 XXX XXXX" required>
                    </div>
                </div>

                <label class="form-label">Correo Electrónico</label>
                <input type="email" class="input-field" placeholder="ejemplo@correo.com" required>

                <label class="form-label">¿Qué producto te interesa?</label>
                <select class="input-field" required>
                    <option value="">Selecciona un seguro</option>
                    <option value="vehicular">Seguro Vehicular</option>
                    <option value="salud">Seguro de Salud</option>
                    <option value="hogar">Seguro de Hogar</option>
                    <option value="vida">Seguro de Vida</option>
                    <option value="empresarial">Seguro Empresarial</option>
                </select>

                <label class="form-label">Detalles adicionales (Opcional)</label>
                <textarea class="input-field" rows="4" placeholder="Ej. Marca y año del vehículo, número de familiares, etc."></textarea>

                <button type="submit" class="submit-btn">
                    <i class="fas fa-paper-plane"></i> Enviar Información
                </button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 iSeguros | Tu tranquilidad en nuestras manos</p>
    </footer>

    <a href="https://wa.me/593987801917" class="wsp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

</body>
</html>
